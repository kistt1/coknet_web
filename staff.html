<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Team - Cookies Network</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --orange:#FF6B00;
      --orange-dark:#CC5500;
      --dark:#1A0E00;
      --dark2:#2D1A00;
      --text:#FFF3E6;
      --text-muted:#FFCB8C;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;}

    nav{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      background:rgba(26,14,0,0.98);
      border-bottom:3px solid var(--orange-dark);
      padding:1rem 5%;
      display:flex;align-items:center;justify-content:space-between;
    }
    .nav-logo{font-family:'Press Start 2P',monospace;color:var(--orange);display:flex;align-items:center;gap:12px;font-size:15px;}
    .nav-logo img{height:38px}
    .nav-links{display:flex;gap:2.2rem}
    .nav-links a{color:var(--text-muted);text-decoration:none;font-weight:700;}
    .nav-links a:hover{color:var(--orange);}

    /* HERO */
    .staff-hero{
      padding-top: 110px;
      padding-bottom: 70px;
      background:linear-gradient(180deg,#1A0E00 0%,#2D1A00 100%);
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .pixel-grid{
      position:absolute;inset:0;
      background-image:linear-gradient(rgba(255,107,0,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(255,107,0,0.06) 1px,transparent 1px);
      background-size:40px 40px;
    }

    .staff-title{
      font-family:'Press Start 2P',monospace;
      font-size:clamp(40px,6vw,58px);
      color:var(--orange);
      text-shadow:0 0 40px var(--orange);
    }

    /* STAFF LIST - Background disamakan dengan halaman utama */
    .staff-section{
      background:var(--dark2);
      border-top:2px solid var(--orange-dark);
      border-bottom:2px solid var(--orange-dark);
      padding:60px 5% 100px;
    }

    .staff-grid{
      max-width:1400px;
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(320px,1fr));
      gap:35px;
    }

    .staff-card{
      background:var(--dark);
      border:2px solid var(--orange-dark);
      border-radius:16px;
      overflow:hidden;
      transition:all 0.4s;
    }
    .staff-card:hover{
      transform:translateY(-12px);
      border-color:var(--orange);
      box-shadow:0 20px 40px rgba(255,107,0,0.25);
    }

    .staff-card img{
      width:100%;
      height:340px;
      object-fit:cover;
    }

    .staff-name{
      background:var(--orange);
      color:#000;
      font-size:1.65rem;
      font-weight:800;
      padding:14px 0;
      text-align:center;
    }

    .staff-info{
      padding:20px 25px 30px;
      text-align:center;
    }

    .staff-role{
      display:inline-block;
      padding:8px 26px;
      border-radius:30px;
      font-weight:800;
      font-size:14px;
      margin:12px 0;
      letter-spacing:1px;
    }
    .owner {background:#FF3333; color:white;}
    .admin {background:#FF8800; color:white;}
    .mod {background:#00CC66; color:white;}
    .helper {background:#4488FF; color:white;}
    .builder {background:#AA77FF; color:white;}

    .mc-name{
      font-family:'Press Start 2P',monospace;
      background:rgba(0,0,0,0.6);
      padding:8px 22px;
      border-radius:30px;
      font-size:0.95rem;
      color:var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <img src="logo.png" alt="Cookies Network"> COOKIES NETWORK
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#fitur">Fitur</a>
      <a href="index.html#toko">Toko</a>
      <a href="index.html#discord">Discord</a>
      <a href="staff.html" style="color:#FF6B00; font-weight:bold;">👥 Staff</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="staff-hero">
    <div class="pixel-grid"></div>
    <h1 class="staff-title">STAFF TEAM</h1>
  </section>

  <!-- STAFF SECTION - Background disamakan -->
  <div class="staff-section">
    <div class="staff-grid">

      <div class="staff-card">
        <img src="img/owner.jpg" alt="Owner">
        <div class="staff-name">Nama Owner</div>
        <div class="staff-info">
          <div class="staff-role owner">OWNER</div>
          <div class="mc-name">owner_mcname</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/admin.jpg" alt="Admin">
        <div class="staff-name">Nama Admin</div>
        <div class="staff-info">
          <div class="staff-role admin">ADMIN</div>
          <div class="mc-name">admin_mcname</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/mod.jpg" alt="Moderator">
        <div class="staff-name">Nama Moderator</div>
        <div class="staff-info">
          <div class="staff-role mod">MODERATOR</div>
          <div class="mc-name">mod_mcname</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/helper.jpg" alt="Helper">
        <div class="staff-name">Nama Helper</div>
        <div class="staff-info">
          <div class="staff-role helper">HELPER</div>
          <div class="mc-name">helper_mcname</div>
        </div>
      </div>

      <div class="staff-card">
        <img src="img/builder.jpg" alt="Builder">
        <div class="staff-name">Nama Builder</div>
        <div class="staff-info">
          <div class="staff-role builder">BUILDER</div>
          <div class="mc-name">builder_mcname</div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
